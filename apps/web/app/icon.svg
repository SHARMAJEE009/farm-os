<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#16a34a"/>

  <!-- Wheat stalk - center -->
  <line x1="16" y1="26" x2="16" y2="8" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Wheat grain - top center -->
  <ellipse cx="16" cy="8" rx="2.2" ry="3.2" fill="white" transform="rotate(0 16 8)"/>

  <!-- Left grains -->
  <ellipse cx="16" cy="12" rx="2" ry="2.8" fill="white" transform="rotate(-35 16 12)"/>
  <ellipse cx="16" cy="16" rx="2" ry="2.8" fill="white" transform="rotate(-35 16 16)"/>

  <!-- Right grains -->
  <ellipse cx="16" cy="12" rx="2" ry="2.8" fill="white" transform="rotate(35 16 12)"/>
  <ellipse cx="16" cy="16" rx="2" ry="2.8" fill="white" transform="rotate(35 16 16)"/>

  <!-- Ground line -->
  <path d="M10 27 Q16 25 22 27" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
</svg>
